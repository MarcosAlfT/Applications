syntax = "proto3";
option csharp_namespace = "Pagarte.Contracts";
package pagarte;

// ── Credit Card Service ────────────────────────────────────────────────────

service CreditCardService {
  rpc GetCards (GetCardsRequest) returns (GetCardsResponse);
  rpc GetCard (GetCardRequest) returns (GetCardResponse);
  rpc RegisterCard (RegisterCardRequest) returns (RegisterCardResponse);
  rpc UpdateCard (UpdateCardRequest) returns (MutationResponse);
  rpc DeleteCard (DeleteCardRequest) returns (MutationResponse);
}

message GetCardsRequest { string client_id = 1; }
message GetCardsResponse { repeated CreditCardDto cards = 1; }

message GetCardRequest {
  string card_id = 1;
  string client_id = 2;
}
message GetCardResponse {
  bool found = 1;
  CreditCardDto card = 2;
}

message RegisterCardRequest {
  string client_id = 1;
  string encrypted_card_data = 2;
  string card_holder_name = 3;
  bool is_default = 4;
}
message RegisterCardResponse {
  bool success = 1;
  string card_id = 2;
  string last4_digits = 3;
  string card_type = 4;
  string error_message = 5;
}

message UpdateCardRequest {
  string card_id = 1;
  string client_id = 2;
  string card_holder_name = 3;
  bool is_default = 4;
}

message DeleteCardRequest {
  string card_id = 1;
  string client_id = 2;
}

message CreditCardDto {
  string id = 1;
  string card_holder_name = 2;
  string last4_digits = 3;
  string card_type = 4;
  int32 expiry_month = 5;
  int32 expiry_year = 6;
  bool is_default = 7;
  string created_at = 8;
}

// ── Payment Service ────────────────────────────────────────────────────────

service PaymentService {
  rpc ProcessPayment (ProcessPaymentRequest) returns (ProcessPaymentResponse);
  rpc GetPayment (GetPaymentRequest) returns (GetPaymentResponse);
  rpc GetPaymentHistory (GetPaymentHistoryRequest) returns (GetPaymentHistoryResponse);
}

message ProcessPaymentRequest {
  string client_id = 1;
  string credit_card_id = 2;
  string service_id = 3;
  string currency = 4;
}
message ProcessPaymentResponse {
  bool success = 1;
  string payment_id = 2;
  string reference = 3;
  string status = 4;
  string error_message = 5;
}

message GetPaymentRequest {
  string payment_id = 1;
  string client_id = 2;
}
message GetPaymentResponse {
  bool found = 1;
  PaymentDto payment = 2;
}

message GetPaymentHistoryRequest {
  string client_id = 1;
  int32 page = 2;
  int32 page_size = 3;
}
message GetPaymentHistoryResponse {
  repeated PaymentDto payments = 1;
  int32 total = 2;
}

message PaymentDto {
  string id = 1;
  string reference = 2;
  string status = 3;
  string currency = 4;
  double total_amount = 5;
  string created_at = 6;
  string processed_at = 7;
  string error_message = 8;
  string service_name = 9;
  repeated PaymentDetailDto details = 10;
}

message PaymentDetailDto {
  string type = 1;
  string description = 2;
  double amount = 3;
  string currency = 4;
}

// ── Service Catalog ────────────────────────────────────────────────────────

service ServiceCatalogService {
  rpc GetServices (GetServicesRequest) returns (GetServicesResponse);
  rpc GetService (GetServiceRequest) returns (GetServiceResponse);
}

message GetServicesRequest { string category = 1; }
message GetServicesResponse { repeated ServiceDto services = 1; }

message GetServiceRequest { string service_id = 1; }
message GetServiceResponse {
  bool found = 1;
  ServiceDto service = 2;
}

message ServiceDto {
  string id = 1;
  string name = 2;
  string description = 3;
  string category = 4;
  double base_amount = 5;
  string currency = 6;
}

// ── Shared ─────────────────────────────────────────────────────────────────

message MutationResponse {
  bool success = 1;
  string error_message = 2;
}
